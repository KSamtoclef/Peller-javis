name: Mobile Performance Demo Update

on:
  push:
    paths:
      - 'trigger-mobile-performance.txt'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Improve index.html mobile performance
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path('index.html')
          html = path.read_text(encoding='utf-8')

          html = html.replace(
            '<meta name="viewport" content="width=device-width, initial-scale=1.0">',
            '<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">',
            1
          )

          html = html.replace(
            '<img class="hero" src="image.png" alt="Peller and Jarvis ₦25,000 Cash Giveaway wedding celebration">',
            '<img class="hero" src="image.png" alt="Peller and Jarvis ₦25,000 Cash Giveaway wedding celebration" width="1200" height="1200" fetchpriority="high" decoding="async">',
            1
          )

          css_anchor = '    .demo-banner{position:sticky;top:0;z-index:999;background:#fff3cd;border-bottom:1px solid #ffe69c;color:#664d03;text-align:center;padding:9px 10px;font-size:12px;font-weight:700}\n'
          css_extra = '''    html{-webkit-text-size-adjust:100%;text-size-adjust:100%;scroll-behavior:smooth}\n    body{min-height:100dvh;overflow-x:hidden;overscroll-behavior-y:contain}\n    img{max-width:100%;height:auto}\n    input,button{touch-action:manipulation}\n    .page{contain:layout paint style}\n    .hero-wrap{min-height:220px;background:linear-gradient(110deg,#ececec 8%,#f7f7f7 18%,#ececec 33%);background-size:200% 100%;animation:skeletonMove 1.1s linear infinite}\n    .hero-wrap.loaded{animation:none;background:#111}\n    .hero{aspect-ratio:1/1;object-fit:cover}\n    .mobile-skeleton{position:fixed;inset:0;z-index:2000;background:#fff;display:grid;place-items:center;transition:opacity .28s ease,visibility .28s ease}\n    .mobile-skeleton.hidden{opacity:0;visibility:hidden;pointer-events:none}\n    .skeleton-card{width:min(92vw,460px);padding:16px}\n    .skeleton-block{height:18px;border-radius:8px;background:linear-gradient(110deg,#ececec 8%,#f7f7f7 18%,#ececec 33%);background-size:200% 100%;animation:skeletonMove 1.1s linear infinite;margin:10px 0}\n    .skeleton-block.hero-line{height:220px;border-radius:14px}\n    .skeleton-block.short{width:62%}\n    @keyframes skeletonMove{to{background-position-x:-200%}}\n    @media(max-width:420px){\n      .page{width:100%;max-width:none}\n      .post{padding:9px;border-left:0;border-right:0}\n      .hero-overlay{left:12px;right:12px;bottom:14px}\n      .hero-overlay h1{font-size:19px}\n      .hero-overlay p{font-size:12px;margin:5px 0 9px}\n      button{width:100%;max-width:330px;min-height:48px;font-size:18px}\n      .phone input{width:100%;font-size:16px}\n      .steps{gap:4px;padding:8px 6px}\n      .step{font-size:9px;padding:7px 1px}\n      .comments-shell{border-radius:10px}\n      .live-comment-list{max-height:360px}\n    }\n    @media(prefers-reduced-motion:reduce){*,*:before,*:after{animation-duration:.01ms!important;animation-iteration-count:1!important;scroll-behavior:auto!important;transition-duration:.01ms!important}}\n'''
          if 'mobile-skeleton' not in html and css_anchor in html:
              html = html.replace(css_anchor, css_anchor + css_extra, 1)

          body_anchor = '<body>\n'
          skeleton = '''<body>\n<div id="mobileSkeleton" class="mobile-skeleton" aria-hidden="true">\n  <div class="skeleton-card">\n    <div class="skeleton-block hero-line"></div>\n    <div class="skeleton-block"></div>\n    <div class="skeleton-block short"></div>\n    <div class="skeleton-block"></div>\n  </div>\n</div>\n'''
          if 'id="mobileSkeleton"' not in html:
              html = html.replace(body_anchor, skeleton, 1)

          html = re.sub(r'<img(?![^>]*loading=)([^>]*class="live-avatar-img"[^>]*)>', r'<img loading="lazy" decoding="async"\1>', html)
          html = re.sub(r'<img(?![^>]*loading=)([^>]*src="https?://[^>]+>)', r'<img loading="lazy" decoding="async"\1', html)

          script_anchor = '</body>'
          perf_script = '''<script>\n(function(){\n  const skeleton=document.getElementById('mobileSkeleton');\n  const hero=document.querySelector('.hero');\n  const heroWrap=document.querySelector('.hero-wrap');\n  function finishLoad(){\n    if(heroWrap) heroWrap.classList.add('loaded');\n    if(skeleton){\n      skeleton.classList.add('hidden');\n      setTimeout(()=>skeleton.remove(),350);\n    }\n  }\n  if(hero){\n    if(hero.complete) finishLoad();\n    else{\n      hero.addEventListener('load',finishLoad,{once:true});\n      hero.addEventListener('error',finishLoad,{once:true});\n    }\n  }else{\n    window.addEventListener('load',finishLoad,{once:true});\n  }\n  setTimeout(finishLoad,2200);\n\n  document.querySelectorAll('img').forEach((img,index)=>{\n    img.decoding='async';\n    if(!img.classList.contains('hero') && index>0) img.loading='lazy';\n  });\n\n  document.addEventListener('gesturestart',e=>e.preventDefault(),{passive:false});\n  let lastTouchEnd=0;\n  document.addEventListener('touchend',e=>{\n    const now=Date.now();\n    if(now-lastTouchEnd<=300) e.preventDefault();\n    lastTouchEnd=now;\n  },{passive:false});\n})();\n</script>\n'''
          if 'function finishLoad()' not in html:
              html = html.replace(script_anchor, perf_script + script_anchor, 1)

          path.write_text(html,encoding='utf-8')
          PY

      - name: Remove temporary files
        run: |
          rm -f .github/workflows/mobile-performance-demo.yml
          rm -f trigger-mobile-performance.txt

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/mobile-performance-demo.yml trigger-mobile-performance.txt
          git diff --cached --quiet || git commit -m "Improve mobile performance and loading experience"
          git push
