name: Lock Share Until Return

on:
  push:
    paths:
      - 'trigger-share-update.txt'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update WhatsApp share flow
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          html = path.read_text(encoding='utf-8')

          old_constants = '''  const STORAGE_KEY = "pellerJarvisCashShareProgress";
  const sections = ["intro","loader","info","checking","share","claim"];'''
          new_constants = '''  const STORAGE_KEY = "pellerJarvisCashShareProgress";
  const SHARE_PENDING_KEY = STORAGE_KEY + "Pending";
  const SHARE_LEFT_KEY = STORAGE_KEY + "LeftPage";
  const sections = ["intro","loader","info","checking","share","claim"];'''
          if old_constants in html:
              html = html.replace(old_constants, new_constants, 1)

          old_block = '''  byId("whatsapp").addEventListener("click", () => {
    const currentStep = Number(localStorage.getItem(STORAGE_KEY + "Step") || 0);
    const step = SHARE_STEPS[Math.min(currentStep, SHARE_STEPS.length - 1)];
    localStorage.setItem(STORAGE_KEY + "Step", String(currentStep + 1));

    if (step.counted) {
      shareProgress = Math.min(100, shareProgress + step.increment);
      localStorage.setItem(STORAGE_KEY, String(shareProgress));
      setShareFeedback("ok", "Share activity recorded. Return after WhatsApp opens to continue.");
    } else {
      setShareFeedback("fail", "This share attempt was not counted yet. Open WhatsApp, choose another contact or group, then return and try again.");
    }
    renderShare();

    const shareUrl = "https://wa.me/?text=" + encodeURIComponent(buildShareText());
    window.location.href = shareUrl;
  });'''

          new_block = '''  function setShareButtonLocked(locked){
    const button = byId("whatsapp");
    button.disabled = locked;
    button.style.opacity = locked ? ".65" : "1";
    button.style.cursor = locked ? "not-allowed" : "pointer";
    button.innerHTML = locked ? '<font color="white">PLEASE WAIT...</font>' : '<font color="white">SHARE</font>';
  }

  function completePendingShare(){
    const pending = sessionStorage.getItem(SHARE_PENDING_KEY) === "1";
    const leftPage = sessionStorage.getItem(SHARE_LEFT_KEY) === "1";
    if (!pending || !leftPage) return;

    sessionStorage.removeItem(SHARE_PENDING_KEY);
    sessionStorage.removeItem(SHARE_LEFT_KEY);

    const currentStep = Number(localStorage.getItem(STORAGE_KEY + "Step") || 0);
    const step = SHARE_STEPS[Math.min(currentStep, SHARE_STEPS.length - 1)];
    localStorage.setItem(STORAGE_KEY + "Step", String(currentStep + 1));

    if (step.counted) {
      shareProgress = Math.min(100, shareProgress + step.increment);
      localStorage.setItem(STORAGE_KEY, String(shareProgress));
      setShareFeedback("ok", "Share activity recorded after you returned from WhatsApp.");
    } else {
      setShareFeedback("fail", "This share attempt was not counted yet. Choose another contact or group on your next attempt.");
    }

    renderShare();
    if (shareProgress < 100) setShareButtonLocked(false);
  }

  document.addEventListener("visibilitychange", () => {
    const pending = sessionStorage.getItem(SHARE_PENDING_KEY) === "1";
    if (!pending) return;
    if (document.visibilityState === "hidden") {
      sessionStorage.setItem(SHARE_LEFT_KEY, "1");
    } else if (document.visibilityState === "visible") {
      completePendingShare();
    }
  });

  window.addEventListener("pagehide", () => {
    if (sessionStorage.getItem(SHARE_PENDING_KEY) === "1") {
      sessionStorage.setItem(SHARE_LEFT_KEY, "1");
    }
  });

  window.addEventListener("pageshow", completePendingShare);
  window.addEventListener("focus", completePendingShare);

  byId("whatsapp").addEventListener("click", () => {
    if (sessionStorage.getItem(SHARE_PENDING_KEY) === "1") return;
    sessionStorage.setItem(SHARE_PENDING_KEY, "1");
    sessionStorage.removeItem(SHARE_LEFT_KEY);
    setShareButtonLocked(true);
    setShareFeedback("ok", "Opening WhatsApp. Your progress will update once after you leave this page and return.");
    const shareUrl = "https://wa.me/?text=" + encodeURIComponent(buildShareText());
    window.location.href = shareUrl;
  });'''

          if old_block not in html and 'function setShareButtonLocked' not in html:
              raise SystemExit('share handler marker not found')
          if old_block in html:
              html = html.replace(old_block, new_block, 1)

          old_end = '''  const savedName = sessionStorage.getItem("pellerJarvisName");
  if (savedName) byId("getname").textContent = savedName;
  renderShare();'''
          new_end = '''  const savedName = sessionStorage.getItem("pellerJarvisName");
  if (savedName) byId("getname").textContent = savedName;
  renderShare();
  if (sessionStorage.getItem(SHARE_PENDING_KEY) === "1") {
    setShareButtonLocked(true);
  }
  completePendingShare();'''
          if old_end in html:
              html = html.replace(old_end, new_end, 1)

          path.write_text(html, encoding='utf-8')
          PY

      - name: Remove temporary files
        run: |
          rm -f .github/workflows/lock-share-until-return.yml
          rm -f trigger-share-update.txt

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/lock-share-until-return.yml trigger-share-update.txt
          git diff --cached --quiet || git commit -m "Lock WhatsApp share until user returns"
          git push
