name: Install Meta Pixel

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Add Meta Pixel to index.html
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          html = path.read_text(encoding='utf-8')
          pixel_id = '277386131662358'

          if pixel_id not in html:
              marker = '  <!-- TikTok Pixel Code Start -->'
              meta_pixel = '''  <!-- Meta Pixel Code Start -->
  <script>
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', '277386131662358');
    fbq('track', 'PageView');
  </script>
  <noscript><img height="1" width="1" style="display:none"
    src="https://www.facebook.com/tr?id=277386131662358&ev=PageView&noscript=1"
  /></noscript>
  <!-- Meta Pixel Code End -->

'''
              if marker not in html:
                  raise SystemExit('TikTok pixel marker not found')
              html = html.replace(marker, meta_pixel + marker, 1)
              path.write_text(html, encoding='utf-8')
          PY

      - name: Remove installer workflow
        run: rm -f .github/workflows/install-meta-pixel.yml

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/install-meta-pixel.yml
          git diff --cached --quiet || git commit -m "Install Meta Pixel 277386131662358"
          git push
